services:
  backend:
    image: richard93147/tfg-backend:v3
    container_name: goats-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/src/.env
    extra_hosts:
      host.docker.internal: host-gateway
    restart: unless-stopped

  frontend:
    image: richard93147/tfg-frontend:v3
    container_name: goats-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped