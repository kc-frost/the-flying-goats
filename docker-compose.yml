version: "3.9"

services:
  backend:
    build: ./backend
    container_name: goats-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    extra_hosts:
      host.docker.internal: host-gateway

  frontend:
    build: ./frontend
    container_name: goats-frontend
    ports:
      - "80:80"
    depends_on:
      - backend