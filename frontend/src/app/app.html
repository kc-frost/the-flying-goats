<main>
  <!-- HEADER -->
  <header>
    <!-- Brand Details -->
    <section class="brand-group">
      <nav>
        <a routerLink='' (click)="toggleExpanded()">
          <img class="brand-logo" src="/brand/plane-logo.svg" alt="An image of a paper plane with a trail marking its path"/>
        </a>
      </nav>
      <h1>The Flying Goats</h1>
    </section>

    <!-- Navigation Links -->
    <nav class="nav-links-group">
      <section class="nav-link"> 
        <a routerLink="/book-flight"> Book a Flight</a>
        <img src="/header/navlink/navlink-arrow.svg" />
      </section>
      <section class="nav-link"> 
        <!-- lil div class to modify the modal without affecting anything else-->
          <div class="modal">
            <a [routerLink]="[{ outlets: { modal: ['inventory'], dropdown: null } }]">View Inventory</a>
            <img src="/header/navlink/navlink-arrow.svg"/>
          </div>
      </section>
      <section class="nav-link"> 
        <a routerLink="/view-appointments"> View Appointments</a>
        <img src="/header/navlink/navlink-arrow.svg"/>
      </section>
      <section class="nav-link"> 
        <a routerLink="/view-users"> View Users</a>
        <img src="/header/navlink/navlink-arrow.svg"/>
      </section>
        <section class="nav-link"> 
          <a routerLink="/pilot-view"> Pilot Schedule</a>
          <img src="/header/navlink/navlink-arrow.svg"/>
      </section>
    </nav>

    <!-- User Profile -->
    <section class="dropdown">
      <p>Login/Register</p>
      <a (click)="handleProfileClick()">
        <img class="profile-dropdown" 
          [src]="isExpanded ? clickedImg : defaultImg" 
          alt="A flat image of a person" 
          (click)="toggleExpanded()" />
      </a>
      <div class="dropdown-content" 
        [style.display]="isExpanded ? 'block' : 'none'">
        <!-- See login.ts (goToRegister()) for more details
        on what this does -->
        <!-- Keywords: Secondary (named) outlet [angular] -->
        <router-outlet name="dropdown"></router-outlet>
      </div>
    </section>
  </header>

  <!-- ---------- -->
  <!-- CONTENT -->
  <!-- Manual separator to make it visually distinct -->
  <!-- ---------- -->
  <section class="content">
    <router-outlet />
  </section>
  <!-- for the modal stuff for view inventory -->
<div class="modal-layer">
  <router-outlet name="modal"></router-outlet>
</div>

</main>
