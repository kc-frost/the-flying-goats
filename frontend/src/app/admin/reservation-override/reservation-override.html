<main>
    <header>
        <h1>Override a Reservation</h1>
    </header>

    <section class="form-box">

        <section class="form">
            <header><h2>Select Reservation to Cancel</h2></header>
            <div class="content reserve">
                <!-- Plan, use the classic for loop where its a div flexbox with text and a RADIO button. Easier to debug if we just allow cancellations one at a time rather than in bulk -->
                @for (reservation of userReservations$ | async; track $index; let idx = $index) {
                    <div class="row">
                        <label [for]="idx">
                            <p style="font-weight: bold; width: 70px;">{{reservation.username}}</p>
                            <div class="r">
                                <div class="route">
                                    <span style="font-weight: bold;">{{reservation.origin}}</span>
                                    <p>→</p>
                                    <span style="font-weight: bold;">{{reservation.destination}}</span>
                                </div>
                                <div class="route">
                                    <span style="font-style: italic;">{{reservation.liftOffDate}}</span>
                                    <span style="font-style: italic;">{{reservation.landingDate}}</span>
                                </div>
                            </div>
                        </label>

                        <input [id]="idx" name="select" type="radio" />
                    </div>
                    <hr>
                }
            </div>
        </section>

        <section class="form">
            <header><h2>Reason for Cancellation</h2></header>

            <div class="content reason">
                <textarea id="reason" required placeholder="Schedule conflict, maintenance due, taking leave, etc."></textarea>
                <button (click)="getCancelleableReservations()">Submit</button>
            </div>
            
        </section>

    </section>

</main>
