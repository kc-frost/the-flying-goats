<main>
    <header>
        <h1>Override a Reservation</h1>
    </header>

    <section class="form-box">

        <section class="form">
            <header><h2>Select Reservation to Cancel</h2></header>
            <div class="content reserve">
                <!-- Plan, use the classic for loop where its a div flexbox with text and a RADIO button. Easier to debug if we just allow cancellations one at a time rather than in bulk -->
                
            </div>
        </section>

        <section class="form">
            <header><h2>Reason for Cancellation</h2></header>

            <div class="content reason">
                <textarea id="reason" required placeholder="Schedule conflict, maintenance due, taking leave, etc."></textarea>
                <button>Submit</button>
            </div>
            
        </section>

    </section>

</main>
