<main>
    <header class="main">
        <h1>Override a Reservation</h1>

        <button class="go-back" [routerLink]="'/dashboard'">Go back</button>
    </header>

    <section class="form-box">

        <section class="form">
            <header><h2>Select Reservation to Cancel</h2></header>
            <div class="content reserve">
                <!-- Plan, use the classic for loop where its a div flexbox with text and a RADIO button. Easier to debug if we just allow cancellations one at a time rather than in bulk -->
                @for (reservation of userReservations$ | async; track $index; let idx = $index) {
                    <div class="row">
                        <label [for]="idx">
                            <p class="name">{{reservation.username}}</p>
                            <hr>
                            <div class="r">
                                <div class="route">
                                    <span class="airport">{{reservation.origin}}</span>
                                    <p>→</p>
                                    <span class="airport">{{reservation.destination}}</span>
                                </div>
                                <div class="route">
                                    <span class="date">{{formatDate(reservation.liftOffDate)}}</span>
                                    <p style="opacity: 0">→</p>
                                    <span class="date">{{formatDate(reservation.landingDate)}}</span>
                                </div>
                            </div>
                        </label>

                        <input [id]="idx" [value]="reservation.bookingNumber" [formControl]="cancellationForm.controls.bookingNumber" name="select" type="radio" />
                    </div>
                    <hr>
                } @empty {
                    <p style="font-weight: bold;">No reservations at this time.</p>
                }
            </div>
        </section>

        <section class="form">
            <header><h2>Reason for Cancellation</h2></header>

            <div class="content reason">
                <textarea [formControl]="cancellationForm.controls.reason" id="reason" required placeholder="Schedule conflict, maintenance due, taking leave, etc."></textarea>
                <button (click)="deleteReservation()">Submit</button>
            </div>
            
        </section>

    </section>

</main>
