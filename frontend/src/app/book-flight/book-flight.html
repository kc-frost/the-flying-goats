<main>
  <section class="book-flight">
    <form id="newFlightDetails" [formGroup]="newFlightDetails" (ngSubmit)="searchFlights()">
    <header>Book a Flight</header>
    <section class="flight-options">
      <div class="location">
        <section class="from">
          <img src="/book-flight/map-marker.svg" />
          <div>
            <label for="origin">From</label>
            <input formControlName="origin" id="origin" type="text" placeholder="Enter City or Airport"/>
            <ul>
              @for (airport of airports$ | async; track $index) {
                <li>{{airport.place}} -- {{airport.IATA}}</li>
              }
            </ul>
          </div>
        </section>
        <section class="to">
          <img src="/book-flight/map-marker.svg" />
          <div>
            <label for="destination">To</label>
            <input formControlName="destination" id="destination" type="text" placeholder="Enter City or Airport" />
          </div>
        </section>
      </div>
      <div class="dates">
        <img src="/book-flight/calendar.svg" />
        <section>
          <label>Depart & Return</label>
          <mat-form-field class="mat-dates">
            <mat-date-range-input [formGroup]="newFlightDetails" [rangePicker]="picker" [min]="MIN_DATE" [max]="MAX_DATE">
            <input matStartDate placeholder="Depart date" formControlName="departureDate">
            <input matEndDate placeholder="Return date" formControlName="arrivalDate">
          </mat-date-range-input>
          <mat-hint>MM/DD/YYYY</mat-hint>
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-date-range-picker #picker startView="month" [startAt]="currentDate"></mat-date-range-picker>
          </mat-form-field>
        </section>
      </div>
      <div class="submit">
        <button type="submit" form="newFlightDetails">Search Flights</button>
      </div>
    </section>
    </form>
  </section>

  <section class="pick-flight">
    <header>Available Flights</header>
    <section class="flight-choices">
      @for (flight of availableFlights$ | async; track $index) {
        <div class="choice">
        <input name="flight" type="radio" [id]=$index required />
        <label [for]=$index>
          <div class="header">
            <p>DEPART</p>
            <p>→</p>
            <p>ARRIVE</p>
          </div>
          <div class="time">
            <p>{{flight.liftOff}}</p>
            <span class="duration">
              {{flight.duration}}
            </span>
            <p>{{flight.landing}}</p>
          </div>
          <div class="airport">
            <p>{{flight.origin}}</p>
            <p>→</p>
            <p>{{flight.destination}}</p>
          </div>
        </label>

        <button popovertarget="seat-modal" >Select Seat</button>
        <dialog class="seat-modal" #seatModal id="seat-modal" popover>
          <app-seat-selector-modal />
        </dialog>
      </div>
      }
    </section>
  </section>

</main>
