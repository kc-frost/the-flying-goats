<main>
  <section class="book-flight">
    <header>Book a Flight</header>
    <section class="flight-options">
      <div class="location">
        <section class="from">
          <img src="/book-flight/map-marker.svg" />
          <div>
            <label for="origin">From</label>
            <input id="origin" type="text" placeholder="Enter City or Airport" />
          </div>
        </section>
        <section class="to">
          <img src="/book-flight/map-marker.svg" />
          <div>
            <label for="destination">To</label>
            <input id="destination" type="text" placeholder="Enter City or Airport" />
          </div>
        </section>
      </div>
      <div class="dates">

      </div>
    </section>
  </section>

  <section class="pick-flight">
    <header>Available Flights</header>
  </section>
